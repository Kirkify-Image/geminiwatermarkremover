<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Magic eraser wand - removing watermark -->
  <defs>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8AB4F8"/>
      <stop offset="100%" stop-color="#4285F4"/>
    </linearGradient>
  </defs>
  <!-- Wand handle -->
  <rect x="25" y="55" width="8" height="35" rx="2" fill="url(#wandGrad)" transform="rotate(-30 29 72)"/>
  <!-- Wand tip - eraser part -->
  <rect x="55" y="18" width="15" height="20" rx="2" fill="#FFFFFF" transform="rotate(-30 62 28)"/>
  <!-- Magic sparkles -->
  <circle cx="62" cy="25" r="2" fill="#8AB4F8"/>
  <circle cx="70" cy="18" r="1.5" fill="#FFFFFF"/>
  <circle cx="58" cy="15" r="1" fill="#8AB4F8" opacity="0.7"/>
  <!-- Motion lines - suggesting removal -->
  <path d="M40 40 Q50 35 60 40" stroke="#8AB4F8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M35 50 Q50 45 65 50" stroke="#8AB4F8" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M38 60 Q50 55 62 60" stroke="#8AB4F8" stroke-width="1" fill="none" opacity="0.3"/>
</svg>