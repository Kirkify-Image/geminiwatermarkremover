<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Dot matrix representing pixel cleanup -->
  <defs>
    <linearGradient id="cleanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8AB4F8"/>
      <stop offset="100%" stop-color="#4285F4"/>
    </linearGradient>
  </defs>
  <!-- Grid of dots - suggesting image pixels -->
  <!-- Row 1 -->
  <circle cx="20" cy="20" r="3" fill="url(#cleanBlue)" opacity="0.3"/>
  <circle cx="35" cy="20" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <circle cx="50" cy="20" r="4" fill="url(#cleanBlue)"/>
  <circle cx="65" cy="20" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <circle cx="80" cy="20" r="3" fill="url(#cleanBlue)" opacity="0.3"/>
  <!-- Row 2 -->
  <circle cx="20" cy="35" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <circle cx="35" cy="35" r="2" fill="url(#cleanBlue)" opacity="0.2"/>
  <circle cx="50" cy="35" r="5" fill="url(#cleanBlue)"/>
  <circle cx="65" cy="35" r="2" fill="url(#cleanBlue)" opacity="0.2"/>
  <circle cx="80" cy="35" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <!-- Row 3 - center highlight -->
  <circle cx="20" cy="50" r="4" fill="url(#cleanBlue)"/>
  <circle cx="35" cy="50" r="5" fill="url(#cleanBlue)"/>
  <circle cx="50" cy="50" r="8" fill="#FFFFFF"/>
  <circle cx="65" cy="50" r="5" fill="url(#cleanBlue)"/>
  <circle cx="80" cy="50" r="4" fill="url(#cleanBlue)"/>
  <!-- Row 4 -->
  <circle cx="20" cy="65" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <circle cx="35" cy="65" r="2" fill="url(#cleanBlue)" opacity="0.2"/>
  <circle cx="50" cy="65" r="5" fill="url(#cleanBlue)"/>
  <circle cx="65" cy="65" r="2" fill="url(#cleanBlue)" opacity="0.2"/>
  <circle cx="80" cy="65" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <!-- Row 5 -->
  <circle cx="20" cy="80" r="3" fill="url(#cleanBlue)" opacity="0.3"/>
  <circle cx="35" cy="80" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <circle cx="50" cy="80" r="4" fill="url(#cleanBlue)"/>
  <circle cx="65" cy="80" r="3" fill="url(#cleanBlue)" opacity="0.5"/>
  <circle cx="80" cy="80" r="3" fill="url(#cleanBlue)" opacity="0.3"/>
</svg>